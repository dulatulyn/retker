services:
  ollama:
    image: ollama/ollama
    container_name: retker-ollama-dev
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: retker-api-dev
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:7b
      AI_PROVIDER_ORDER: ollama
      RETKER_SECRET: dev-secret-please-change-32bytes-minimum
    ports:
      - "8000:8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: retker-nginx-dev
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./nginx/retker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend-dist:/usr/share/nginx/html:ro

volumes:
  ollama_models:
