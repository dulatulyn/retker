# retker-nginx — внутренний прокси retker.
# Отдаёт SPA-статику + проксирует /v1 на retker-api. TLS терминируется ВЫШЕ
# (nginx asynkor'а или Cloudflare), здесь только HTTP :80. Файл монтируется в
# /etc/nginx/conf.d/default.conf (стоковый nginx подключает conf.d внутри http{}).

# восстановить реальный IP клиента из заголовков фронт-прокси (для логов и лимитов)
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# МЯГКИЙ рейт-лимит ТОЛЬКО на эндпоинты, дёргающие LLM (Gemini/OpenAI/Anthropic).
# 30 запросов/мин на один IP + всплеск до 15. Приём логов сюда НЕ попадает.
limit_req_zone $binary_remote_addr zone=llm:10m rate=30r/m;
limit_req_status 429;

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 80 default_server;
    server_name retker.kz www.retker.kz api.retker.kz _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # лог с реальным IP — чтобы видеть, кто и сколько обращается
    access_log /var/log/nginx/retker.access.log;

    # общие настройки проксирования (наследуются в location ниже)
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;   # длинные SSE/WebSocket-соединения
    proxy_buffering off;        # важно для SSE-стрима событий

    # ── AI-аналитик (расход LLM) — мягкий лимит ──
    location = /v1/chat        { limit_req zone=llm burst=15 nodelay; proxy_pass http://retker-api:8000; }
    location = /v1/chat/ws     { limit_req zone=llm burst=15 nodelay; proxy_pass http://retker-api:8000; }

    # ── приём логов и весь остальной API — БЕЗ лимита (логи должны идти свободно) ──
    location /v1/ { proxy_pass http://retker-api:8000; }

    # ── SPA (BrowserRouter): любой путь → index.html ──
    location / { try_files $uri $uri/ /index.html; }
}
