# ─────────────────────────────────────────────────────────────────────────────
# ПУТЬ A: вставка для nginx asynkor'а, чтобы добавить retker.kz, НЕ трогая asynkor.com.
#
# Куда: добавить эти блоки в /opt/coframe/nginx/nginx.conf ВНУТРИ http { ... },
# рядом с остальными server-блоками (после них). asynkor.com не меняется.
#
# Перед правкой: бэкап + проверка + reload (НЕ restart):
#   cp /opt/coframe/nginx/nginx.conf /opt/coframe/nginx/nginx.conf.bak.$(date +%F)
#   docker exec asynkor-nginx nginx -t        # должно быть "syntax is ok / test is successful"
#   docker exec asynkor-nginx nginx -s reload
#
# ВАЖНО: деплой asynkor перезаписывает nginx.conf целиком — эти блоки сотрутся
# при следующем его деплое. Для постоянства добавь их в репозиторий asynkor.
#
# ПРИМ.: в http{} asynkor'а должен быть `map $http_upgrade $connection_upgrade {...}`
# (для WebSocket). Если его нет — добавь рядом:
#   map $http_upgrade $connection_upgrade { default upgrade; '' close; }
# ─────────────────────────────────────────────────────────────────────────────

upstream retker {
    server retker-nginx:80;   # контейнер retker в общей сети coframe_internal
}

# HTTP → редирект на HTTPS (+ ACME-челлендж для выпуска/продления сертификата)
server {
    listen 80;
    server_name retker.kz www.retker.kz;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name retker.kz www.retker.kz;

    ssl_certificate     /etc/letsencrypt/live/retker.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/retker.kz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # всё на retker-nginx (он сам раздаёт SPA и проксирует /v1 + рейт-лимит LLM)
    location / {
        proxy_pass http://retker;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;   # WebSocket /v1/chat/ws
        proxy_read_timeout 3600s;
        proxy_buffering off;                                 # SSE /v1/stream
    }
}
