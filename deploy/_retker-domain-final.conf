# >>> retker-domain >>>
server {
    listen 80;
    server_name retker.kz www.retker.kz api.retker.kz;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    http2 on;
    server_name retker.kz www.retker.kz api.retker.kz;

    ssl_certificate     /etc/letsencrypt/live/retker.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/retker.kz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://retker_ip;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $retker_conn_upgrade;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
}
# <<< retker-domain <<<
