    # ── retker (added) — bare-IP доступ http://167.233.124.48 → retker-nginx ──
    # Матчится по Host=IP, server-блоки asynkor.com/coframe.run не затрагиваются.
    map $http_upgrade $retker_conn_upgrade { default upgrade; "" close; }
    upstream retker_ip { server retker-nginx:80; }
    server {
        listen 80;
        server_name 167.233.124.48;
        client_max_body_size 10m;
        location / {
            proxy_pass http://retker_ip;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $retker_conn_upgrade;
            proxy_read_timeout 3600s;
            proxy_buffering off;
        }
    }
